name: todo_app
description: A simple Flutter To-Do List application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  speech_to_text: ^7.3.0
  supabase_flutter: ^2.12.2
  flutter_svg: ^2.2.4
  webview_flutter: ^4.13.0
  webview_win_floating: ^3.0.2
  lucide_icons: ^0.257.0
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
